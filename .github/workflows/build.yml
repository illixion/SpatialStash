name: Build IPA

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH="/Applications/Xcode_26.3.app"
          if [ ! -d "$XCODE_PATH" ]; then
            echo "Error: Xcode 26.3 not found at $XCODE_PATH"
            exit 1
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Set build info
        run: ./scripts/set-build-info.sh

      - name: Build for visionOS
        run: |
          xcodebuild -quiet \
            -project SpatialStash/SpatialStash.xcodeproj \
            -scheme SpatialStash \
            -destination 'generic/platform=visionOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build

      - name: Package IPA
        run: |
          APP_PATH=$(find build/DerivedData -name '*.app' -type d | head -1)
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build && zip -qr SpatialStash.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpatialStash
          path: build/SpatialStash.ipa

      - name: Create a version string
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          else
            TAG="v0.1.0-${GITHUB_SHA::8}"
            VERSION="0.1.0-${GITHUB_SHA::8}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename IPA with version
        id: ipa
        run: |
          IPA_NAME="SpatialStash-${{ steps.version.outputs.version }}-unsigned.ipa"
          cp build/SpatialStash.ipa "$IPA_NAME"
          echo "ipa_file=$IPA_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name != 'pull_request'
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          release_name: ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        if: github.event_name != 'pull_request'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.ipa.outputs.ipa_file }}
          asset_name: ${{ steps.ipa.outputs.ipa_file }}
          asset_content_type: application/octet-stream
