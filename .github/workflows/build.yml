name: Build IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH="/Applications/Xcode_26.3.app"
          if [ ! -d "$XCODE_PATH" ]; then
            echo "Error: Xcode 26.3 not found at $XCODE_PATH"
            exit 1
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Set build info
        run: ./scripts/set-build-info.sh

      - name: Build for visionOS
        run: |
          xcodebuild -quiet \
            -project SpatialStash/SpatialStash.xcodeproj \
            -scheme SpatialStash \
            -destination 'generic/platform=visionOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build

      - name: Package IPA
        run: |
          APP_PATH=$(find build/DerivedData -name '*.app' -type d | head -1)
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build && zip -qr SpatialStash.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpatialStash
          path: build/SpatialStash.ipa
